name: config_web
file: config/config.yaml
required_sections:
  - window
  - task
  - timing
  - stimuli
  - triggers
mandatory_nested_keys:
  - task.task_name
  - task.key_list
  - triggers.map
forbidden_nested_keys:
  - qa
  - sim
mandatory_value_specs:
  window.size:
    type: list_int
    exact_len: 2
  window.units:
    type: str
    min_length: 1
  window.screen:
    type: int
    min: 0
  window.bg_color:
    type: str
    min_length: 1
  window.fullscreen:
    type: bool
  task.task_name:
    type: str
    min_length: 1
  task.total_blocks:
    type: int
    min: 1
  task.total_trials:
    type: int
    min: 1
  task.conditions:
    type: list_str
    min_items: 1
  task.key_list:
    type: list_str
    min_items: 1
  task.seed_mode:
    type: str
    allowed:
      - same_across_sub
      - same_within_sub
  timing:
    type: mapping
  stimuli:
    type: mapping
    min_items: 1
  triggers.map:
    type: mapping
    min_items: 1
stim_supported_types:
  - text
  - textbox
  - circle
  - rect
  - polygon
  - image
  - shape
  - movie
  - sound
stim_asset_types:
  - image
  - movie
  - sound
stim_asset_path_keys_any:
  - file
  - filename
  - image
  - path
stim_asset_path_keys_by_type:
  image:
    - image
    - file
    - path
  movie:
    - filename
    - file
    - path
  sound:
    - file
    - filename
    - path
stim_asset_path_prefixes:
  - assets/
  - ./assets/
  - assets\
  - .\assets\
notes:
  - Web tasks may not configure a trigger driver because triggering is runtime-host dependent.
